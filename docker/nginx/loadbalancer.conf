upstream laravel_nodes {
    least_conn;
    server app1-web:8080 max_fails=3 fail_timeout=30s;
    server app2-web:8080 max_fails=3 fail_timeout=30s;
    server app3-web:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 8080;
    server_name _;

    add_header X-Upstream  $upstream_addr;
    add_header X-Algorithm "least_conn";

    client_max_body_size 2000M;

    location / {
        proxy_pass         http://laravel_nodes;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
