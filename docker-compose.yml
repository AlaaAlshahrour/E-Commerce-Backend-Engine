services:

    # Load Balancer
    loadbalancer:
        image: nginx:alpine
        container_name: lb-nginx
        ports:
            - "8080:8080"
        volumes:
            - ./docker/nginx/loadbalancer.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www
        depends_on:
            - app
        networks:
            - ecommerce-network

    # Laravel App — 3 نسخ متطابقة
    app:
        build:
            args:
                user: laravel
                uid: 1000
            context: .
            dockerfile: Dockerfile
        deploy:
            replicas: 3            # ← docker-compose ينشئ 3 containers تلقائياً
        ports:
            - "9000"               # بدون HOST port → random port لكل replica
        environment:
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=ecommerce
            - DB_USERNAME=laravel
            - DB_PASSWORD=secret
            - REDIS_HOST=redis
            - REDIS_PORT=6379
        volumes:
            - .:/var/www
        networks:
            - ecommerce-network

    mysql:
        image: mysql:8.0
        container_name: ecommerce-mysql
        environment:
            MYSQL_DATABASE: ecommerce
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - ecommerce-network

    redis:
        image: redis:alpine
        container_name: ecommerce-redis
        networks:
            - ecommerce-network

networks:
    ecommerce-network:
        driver: bridge

volumes:
    mysql-data:
