info:
  name: Create Category
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/categories"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: phones-alaa
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
